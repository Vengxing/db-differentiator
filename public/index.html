<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DB Differentiator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind-config.js"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <div class="container mx-auto px-4 py-8 max-w-7xl">
    
    <!-- Header -->
    <header class="mb-8">
      <h1 class="text-3xl font-bold text-white flex items-center gap-3">
        <span class="text-4xl">🔍</span> DB Differentiator
      </h1>
      <p class="text-gray-400 mt-2">MySQL 5.6 / MariaDB 10.6 Comparison Tool</p>
    </header>

    <!-- Connection Info -->
    <div id="connection-info" class="grid md:grid-cols-2 gap-4 mb-8">
      <div class="bg-gray-800 rounded-lg p-4 border-l-4 border-db1">
        <h3 id="db1-title" class="text-db1 font-semibold mb-2">📊 DB1 (Source)</h3>
        <div id="db1-info" class="text-sm text-gray-300 space-y-1"></div>
      </div>
      <div class="bg-gray-800 rounded-lg p-4 border-l-4 border-db2">
        <h3 id="db2-title" class="text-db2 font-semibold mb-2">📊 DB2 (Target)</h3>
        <div id="db2-info" class="text-sm text-gray-300 space-y-1"></div>
      </div>
    </div>

    <!-- Connection Status -->
    <div id="connection-status" class="mb-6"></div>

    <!-- Navigation Tabs -->
    <div class="flex flex-wrap gap-2 mb-6 border-b border-gray-700 pb-4">
      <button onclick="showTab('tables')" id="tab-tables" class="tab-btn px-4 py-2 rounded-lg bg-blue-600 text-white font-medium">
        📋 Tables
      </button>
      <button onclick="showTab('schemas')" id="tab-schemas" class="tab-btn px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-300">
        🔧 Schemas
      </button>
      <button onclick="showTab('counts')" id="tab-counts" class="tab-btn px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-300">
        🔢 Row Counts
      </button>
      <button onclick="showTab('pks')" id="tab-pks" class="tab-btn px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-300">
        🔑 Primary Keys
      </button>
      <button onclick="showTab('rows')" id="tab-rows" class="tab-btn px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-300">
        📝 Row Content
      </button>
      <button onclick="showTab('indexes')" id="tab-indexes" class="tab-btn px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-300">
        📊 Indexes
      </button>
      <button onclick="showTab('api-tables')" id="tab-api-tables" class="tab-btn px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-300">
        🔌 API Tables
      </button>
      <button onclick="showTab('api-endpoints')" id="tab-api-endpoints" class="tab-btn px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-300">
        📡 API Endpoints
      </button>
      <button onclick="showTab('flow-table')" id="tab-flow-table" class="tab-btn px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-300">
        🌊 Flow Table
      </button>
    </div>

    <!-- Tab Content -->
    <div id="tab-content" class="bg-gray-800 rounded-lg p-6">
      <div class="text-center text-gray-400 py-8">
        <div class="loader mx-auto mb-4"></div>
        <p>Loading...</p>
      </div>
    </div>

  </div>

  <!-- Shared App State & Logic -->
  <script src="/js/app.js"></script>
  
  <!-- Tab Components -->
  <script src="/js/components/tables.js"></script>
  <script src="/js/components/schemas.js"></script>
  <script src="/js/components/counts.js"></script>
  <script src="/js/components/pks.js"></script>
  <script src="/js/components/rows.js"></script>
  <script src="/js/components/indexes.js"></script>
  <script src="/js/components/api.js"></script>
  <script src="/js/components/flowTable.js"></script>

  <!-- Initialize App -->
  <script>
    // Initialize on load
    init();
  </script>
</body>
</html>
