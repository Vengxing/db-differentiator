<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DB Differentiator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            db1: '#06b6d4',
            db2: '#a855f7'
          }
        }
      }
    }
  </script>
  <style>
    .loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #3498db;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .fade-in {
      animation: fadeIn 0.3s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <div class="container mx-auto px-4 py-8 max-w-7xl">
    
    <!-- Header -->
    <header class="mb-8">
      <h1 class="text-3xl font-bold text-white flex items-center gap-3">
        <span class="text-4xl">🔍</span> DB Differentiator
      </h1>
      <p class="text-gray-400 mt-2">MySQL 5.6 / MariaDB 10.6 Comparison Tool</p>
    </header>

    <!-- Connection Info -->
    <div id="connection-info" class="grid md:grid-cols-2 gap-4 mb-8">
      <div class="bg-gray-800 rounded-lg p-4 border-l-4 border-db1">
        <h3 id="db1-title" class="text-db1 font-semibold mb-2">📊 DB1 (Source)</h3>
        <div id="db1-info" class="text-sm text-gray-300 space-y-1"></div>
      </div>
      <div class="bg-gray-800 rounded-lg p-4 border-l-4 border-db2">
        <h3 id="db2-title" class="text-db2 font-semibold mb-2">📊 DB2 (Target)</h3>
        <div id="db2-info" class="text-sm text-gray-300 space-y-1"></div>
      </div>
    </div>

    <!-- Connection Status -->
    <div id="connection-status" class="mb-6"></div>

    <!-- Navigation Tabs -->
    <div class="flex flex-wrap gap-2 mb-6 border-b border-gray-700 pb-4">
      <button onclick="showTab('tables')" id="tab-tables" class="tab-btn px-4 py-2 rounded-lg bg-blue-600 text-white font-medium">
        📋 Tables
      </button>
      <button onclick="showTab('schemas')" id="tab-schemas" class="tab-btn px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-300">
        🔧 Schemas
      </button>
      <button onclick="showTab('counts')" id="tab-counts" class="tab-btn px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-300">
        🔢 Row Counts
      </button>
      <button onclick="showTab('pks')" id="tab-pks" class="tab-btn px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-300">
        🔑 Primary Keys
      </button>
      <button onclick="showTab('rows')" id="tab-rows" class="tab-btn px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-300">
        📝 Row Content
      </button>
      <button onclick="showTab('indexes')" id="tab-indexes" class="tab-btn px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-300">
        📊 Indexes
      </button>
      <button onclick="showTab('api-tables')" id="tab-api-tables" class="tab-btn px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-300">
        🔌 API Tables
      </button>
      <button onclick="showTab('api-endpoints')" id="tab-api-endpoints" class="tab-btn px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-300">
        📡 API Endpoints
      </button>
      <button onclick="showTab('flow-table')" id="tab-flow-table" class="tab-btn px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-300">
        🌊 Flow Table
      </button>
    </div>

    <!-- Tab Content -->
    <div id="tab-content" class="bg-gray-800 rounded-lg p-6">
      <div class="text-center text-gray-400 py-8">
        <div class="loader mx-auto mb-4"></div>
        <p>Loading...</p>
      </div>
    </div>

  </div>

  <script>
    let currentTab = 'tables';
    let db1Name = 'DB1';
    let db2Name = 'DB2';

    // Helper to copy text to clipboard
    window.copyQuery = function(btn, text) {
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerText;
        btn.innerText = 'Copied!';
        btn.classList.add('bg-green-700');
        btn.classList.remove('bg-gray-700');
        setTimeout(() => {
          btn.innerText = originalText;
          btn.classList.remove('bg-green-700');
          btn.classList.add('bg-gray-700');
        }, 2000);
      }).catch(err => {
        console.error('Failed to copy: ', err);
      });
    };

    // Initialize
    async function init() {
      await loadConnectionInfo();
      await testConnection();
      await loadTables();
    }

    // Load connection info
    async function loadConnectionInfo() {
      try {
        const res = await fetch('/api/connections');
        const data = await res.json();
        
        db1Name = data.db1.displayName;
        db2Name = data.db2.displayName;
        
        // Update header titles with aliases
        document.getElementById('db1-title').innerHTML = `📊 ${db1Name} <span class="text-gray-500 text-sm">(Source)</span>`;
        document.getElementById('db2-title').innerHTML = `📊 ${db2Name} <span class="text-gray-500 text-sm">(Target)</span>`;
        
        document.getElementById('db1-info').innerHTML = `
          <div><span class="text-gray-500">Host:</span> ${data.db1.host}</div>
          <div><span class="text-gray-500">Port:</span> ${data.db1.port}</div>
          <div><span class="text-gray-500">Database:</span> <strong>${data.db1.database}</strong></div>
          <div><span class="text-gray-500">User:</span> ${data.db1.user}</div>
        `;
        document.getElementById('db2-info').innerHTML = `
          <div><span class="text-gray-500">Host:</span> ${data.db2.host}</div>
          <div><span class="text-gray-500">Port:</span> ${data.db2.port}</div>
          <div><span class="text-gray-500">Database:</span> <strong>${data.db2.database}</strong></div>
          <div><span class="text-gray-500">User:</span> ${data.db2.user}</div>
        `;
      } catch (e) {
        console.error(e);
      }
    }

    // Test connection
    async function testConnection() {
      const statusDiv = document.getElementById('connection-status');
      statusDiv.innerHTML = '<div class="loader"></div> <span class="text-gray-400 ml-2">Testing connections...</span>';
      
      try {
        const res = await fetch('/api/test-connection');
        const data = await res.json();
        
        if (data.success) {
          statusDiv.innerHTML = '<span class="text-green-400 font-medium">✓ Connected to both databases</span>';
        } else {
          statusDiv.innerHTML = `<span class="text-red-400 font-medium">✗ ${data.message}</span>`;
        }
      } catch (e) {
        statusDiv.innerHTML = `<span class="text-red-400 font-medium">✗ Connection failed: ${e.message}</span>`;
      }
    }

    // Show tab
    function showTab(tab) {
      currentTab = tab;
      
      // Update tab buttons
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('bg-blue-600', 'text-white');
        btn.classList.add('bg-gray-700', 'text-gray-300');
      });
      document.getElementById(`tab-${tab}`).classList.remove('bg-gray-700', 'text-gray-300');
      document.getElementById(`tab-${tab}`).classList.add('bg-blue-600', 'text-white');
      
      // Load content
      switch(tab) {
        case 'tables': loadTables(); break;
        case 'schemas': loadSchemas(); break;
        case 'counts': loadCounts(); break;
        case 'pks': loadPKs(); break;
        case 'rows': loadRows(); break;
        case 'indexes': loadIndexes(); break;
        case 'api-tables': loadApiTables(); break;
        case 'api-endpoints': loadApiEndpoints(); break;
        case 'flow-table': loadFlowTable(); break;
      }
    }

    // Load tables comparison
    let currentTableFilter = 'all';
    
    async function loadTables(filter = 'all') {
      currentTableFilter = filter;
      const content = document.getElementById('tab-content');
      content.innerHTML = '<div class="text-center py-8"><div class="loader mx-auto"></div></div>';
      
      try {
        const res = await fetch('/api/tables');
        tablesData = await res.json();
        
        const filterBtnClass = (f) => f === filter 
          ? 'ring-2 ring-white ring-offset-2 ring-offset-gray-800 transform scale-105' 
          : 'hover:scale-105 cursor-pointer';
        
        let html = `
          <div class="mb-6">
            <div class="flex justify-between items-center mb-4">
              <h2 class="text-xl font-bold">📋 Table Comparison</h2>
              <button onclick="loadTables(currentTableFilter)" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-sm flex items-center gap-1">
                <span>🔄</span> Refresh
              </button>
            </div>
            <p class="text-gray-400 text-sm mb-3">Click a card to filter the table list:</p>
            <div class="grid grid-cols-2 md:grid-cols-6 gap-4 mb-6">
              <div onclick="loadTables('all')" class="bg-gray-700 rounded-lg p-4 text-center transition-all cursor-pointer ${filterBtnClass('all')}">
                <div class="text-2xl font-bold text-white">${tablesData.tables.length}</div>
                <div class="text-sm text-gray-400">All Tables</div>
              </div>
              <div onclick="loadTables('db1')" class="bg-gray-700 rounded-lg p-4 text-center transition-all cursor-pointer ${filterBtnClass('db1')}">
                <div class="text-2xl font-bold text-db1">${tablesData.db1Tables}</div>
                <div class="text-sm text-gray-400">In ${db1Name}</div>
              </div>
              <div onclick="loadTables('db2')" class="bg-gray-700 rounded-lg p-4 text-center transition-all cursor-pointer ${filterBtnClass('db2')}">
                <div class="text-2xl font-bold text-db2">${tablesData.db2Tables}</div>
                <div class="text-sm text-gray-400">In ${db2Name}</div>
              </div>
              <div onclick="loadTables('both')" class="bg-gray-700 rounded-lg p-4 text-center transition-all cursor-pointer ${filterBtnClass('both')}">
                <div class="text-2xl font-bold text-green-400">${tablesData.common}</div>
                <div class="text-sm text-gray-400">In Both</div>
              </div>
              <div onclick="loadTables('db1-only')" class="bg-gray-700 rounded-lg p-4 text-center transition-all cursor-pointer ${filterBtnClass('db1-only')}">
                <div class="text-2xl font-bold ${tablesData.onlyInDb1 > 0 ? 'text-red-400' : 'text-green-400'}">${tablesData.onlyInDb1}</div>
                <div class="text-sm text-gray-400">Only in ${db1Name}</div>
              </div>
              <div onclick="loadTables('db2-only')" class="bg-gray-700 rounded-lg p-4 text-center transition-all cursor-pointer ${filterBtnClass('db2-only')}">
                <div class="text-2xl font-bold ${tablesData.onlyInDb2 > 0 ? 'text-red-400' : 'text-green-400'}">${tablesData.onlyInDb2}</div>
                <div class="text-sm text-gray-400">Only in ${db2Name}</div>
              </div>
            </div>
          </div>
          
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b border-gray-700">
                  <th class="text-left py-3 px-4">Table Name</th>
                  <th class="text-center py-3 px-4 text-db1">${db1Name}</th>
                  <th class="text-center py-3 px-4 text-db2">${db2Name}</th>
                  <th class="text-center py-3 px-4">Status</th>
                </tr>
              </thead>
              <tbody>
        `;
        
        // Apply filter
        let filteredTables = tablesData.tables;
        if (filter === 'db1') {
          filteredTables = tablesData.tables.filter(t => t.inDb1);
        } else if (filter === 'db2') {
          filteredTables = tablesData.tables.filter(t => t.inDb2);
        } else if (filter === 'both') {
          filteredTables = tablesData.tables.filter(t => t.status === 'both');
        } else if (filter === 'db1-only') {
          filteredTables = tablesData.tables.filter(t => t.status === 'db1-only');
        } else if (filter === 'db2-only') {
          filteredTables = tablesData.tables.filter(t => t.status === 'db2-only');
        }
        
        if (filteredTables.length === 0) {
          html += `<tr><td colspan="4" class="py-8 text-center text-gray-400">No tables match this filter</td></tr>`;
        }
        
        for (const table of filteredTables) {
          const statusClass = table.status === 'both' ? 'text-green-400' : 'text-red-400';
          const statusIcon = table.status === 'both' ? '✓ Match' : 
                            table.status === 'db1-only' ? `✗ Missing in ${db2Name}` : `✗ Missing in ${db1Name}`;
          
          html += `
            <tr class="border-b border-gray-700/50 hover:bg-gray-700/30">
              <td class="py-3 px-4 font-medium">${table.name}</td>
              <td class="text-center py-3 px-4">${table.inDb1 ? '<span class="text-green-400">✓</span>' : '<span class="text-red-400">✗</span>'}</td>
              <td class="text-center py-3 px-4">${table.inDb2 ? '<span class="text-green-400">✓</span>' : '<span class="text-red-400">✗</span>'}</td>
              <td class="text-center py-3 px-4 ${statusClass}">${statusIcon}</td>
            </tr>
          `;
        }
        
        html += '</tbody></table></div>';
        content.innerHTML = html;
        
      } catch (e) {
        content.innerHTML = `<div class="text-red-400">Error: ${e.message}</div>`;
      }
    }

    // Load schemas
    // Schema overview data cache
    let schemasOverviewData = null;
    let currentSchemaFilter = 'all';
    
    async function loadSchemas(filter = 'all') {
      currentSchemaFilter = filter;
      const content = document.getElementById('tab-content');
      
      // Load schema overview if not cached
      if (!schemasOverviewData) {
        content.innerHTML = '<div class="text-center py-8"><div class="loader mx-auto"></div><p class="text-gray-400 mt-2">Analyzing schemas for all tables...</p></div>';
        try {
          const res = await fetch('/api/schemas-overview');
          schemasOverviewData = await res.json();
        } catch (e) {
          content.innerHTML = `<div class="text-red-400">Error: ${e.message}</div>`;
          return;
        }
      }
      
      const data = schemasOverviewData;
      
      // Filter tables based on selection
      let filteredTables = data.tables;
      if (filter === 'match') filteredTables = data.tables.filter(t => t.status === 'match');
      else if (filter === 'different') filteredTables = data.tables.filter(t => t.status === 'different');
      else if (filter === 'missing-column') filteredTables = data.tables.filter(t => t.status === 'missing-column');
      else if (filter === 'missing') filteredTables = data.tables.filter(t => t.status === 'missing');
      
      let html = `
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold">🔧 Schema Comparison</h2>
          <button onclick="schemasOverviewData = null; loadSchemas(currentSchemaFilter)" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-sm flex items-center gap-1">
            <span>🔄</span> Refresh
          </button>
        </div>
        
        <!-- Legend -->
        <div class="flex flex-wrap gap-4 mb-4 text-sm">
          <div class="flex items-center gap-2"><span class="w-4 h-4 rounded bg-green-600"></span> All columns match</div>
          <div class="flex items-center gap-2"><span class="w-4 h-4 rounded bg-yellow-600"></span> Structure differences</div>
          <div class="flex items-center gap-2"><span class="w-4 h-4 rounded bg-red-600"></span> Missing column(s)</div>
          <div class="flex items-center gap-2"><span class="w-4 h-4 rounded bg-gray-900 border border-gray-600"></span> Table missing</div>
        </div>
        
        <!-- Summary Cards (Clickable Filters) -->
        <div class="grid grid-cols-5 gap-3 mb-6">
          <div onclick="loadSchemas('all')" class="cursor-pointer bg-gray-700 rounded p-3 text-center transition hover:bg-gray-600 ${filter === 'all' ? 'ring-2 ring-blue-500' : ''}">
            <div class="text-xl font-bold text-white">${data.summary.total}</div>
            <div class="text-xs text-gray-400">All Tables</div>
          </div>
          <div onclick="loadSchemas('match')" class="cursor-pointer bg-green-900/40 rounded p-3 text-center transition hover:bg-green-900/60 ${filter === 'match' ? 'ring-2 ring-green-500' : ''}">
            <div class="text-xl font-bold text-green-400">${data.summary.matching}</div>
            <div class="text-xs text-gray-400">✓ Matching</div>
          </div>
          <div onclick="loadSchemas('different')" class="cursor-pointer bg-yellow-900/40 rounded p-3 text-center transition hover:bg-yellow-900/60 ${filter === 'different' ? 'ring-2 ring-yellow-500' : ''}">
            <div class="text-xl font-bold text-yellow-400">${data.summary.different}</div>
            <div class="text-xs text-gray-400">⚠ Different</div>
          </div>
          <div onclick="loadSchemas('missing-column')" class="cursor-pointer bg-red-900/40 rounded p-3 text-center transition hover:bg-red-900/60 ${filter === 'missing-column' ? 'ring-2 ring-red-500' : ''}">
            <div class="text-xl font-bold text-red-400">${data.summary.missingColumn}</div>
            <div class="text-xs text-gray-400">✗ Missing Column</div>
          </div>
          <div onclick="loadSchemas('missing')" class="cursor-pointer bg-gray-900/80 rounded p-3 text-center transition hover:bg-gray-900 border border-gray-700 ${filter === 'missing' ? 'ring-2 ring-gray-400' : ''}">
            <div class="text-xl font-bold text-gray-400">${data.summary.missingTable}</div>
            <div class="text-xs text-gray-400">Table Missing</div>
          </div>
        </div>
        
        <p class="text-gray-400 mb-4">Click a table to view detailed schema comparison:</p>
      `;
      
      // Separate tables by group
      const tablesInBoth = filteredTables.filter(t => t.status !== 'missing');
      const tablesOnlyInDb1 = filteredTables.filter(t => t.status === 'missing' && t.inDb1);
      const tablesOnlyInDb2 = filteredTables.filter(t => t.status === 'missing' && t.inDb2);
      
      // Helper to render table buttons
      const renderTableBtn = (table) => {
        let btnClass = '';
        let title = '';
        
        switch (table.status) {
          case 'match':
            btnClass = 'bg-green-700 hover:bg-green-600 text-white';
            title = 'All columns match';
            break;
          case 'different':
            btnClass = 'bg-yellow-700 hover:bg-yellow-600 text-white';
            title = 'Structure differences (type, nullable, etc.)';
            break;
          case 'missing-column':
            btnClass = 'bg-red-700 hover:bg-red-600 text-white';
            title = 'Has missing column(s)';
            break;
          case 'missing':
            btnClass = 'bg-gray-900 hover:bg-gray-800 text-gray-400 border border-gray-600';
            title = table.inDb1 ? `Missing in ${db2Name}` : `Missing in ${db1Name}`;
            break;
        }
        
        return `<button onclick="loadSchemaForTable('${table.table}')" class="schema-btn px-3 py-1 rounded text-sm ${btnClass}" title="${title}">${table.table}</button>`;
      };
      
      // Render tables in both DBs (green/yellow/red)
      if (tablesInBoth.length > 0) {
        html += `
          <div class="mb-6">
            <h3 class="text-sm font-semibold text-gray-400 mb-2 flex items-center gap-2">
              <span class="text-db1">${db1Name}</span> <span class="text-gray-600">&</span> <span class="text-db2">${db2Name}</span>
              <span class="text-gray-600">(${tablesInBoth.length})</span>
            </h3>
            <div class="flex flex-wrap gap-2">
              ${tablesInBoth.map(renderTableBtn).join('')}
            </div>
          </div>
        `;
      }
      
      // Render tables only in DB1 (black - missing from DB2)
      if (tablesOnlyInDb1.length > 0) {
        html += `
          <div class="mb-6">
            <h3 class="text-sm font-semibold mb-2 flex items-center gap-2">
              <span class="text-db1">📊 Only in ${db1Name}</span>
              <span class="text-gray-600">(${tablesOnlyInDb1.length} - missing from ${db2Name})</span>
            </h3>
            <div class="flex flex-wrap gap-2">
              ${tablesOnlyInDb1.map(renderTableBtn).join('')}
            </div>
          </div>
        `;
      }
      
      // Render tables only in DB2 (black - missing from DB1)
      if (tablesOnlyInDb2.length > 0) {
        html += `
          <div class="mb-6">
            <h3 class="text-sm font-semibold mb-2 flex items-center gap-2">
              <span class="text-db2">📊 Only in ${db2Name}</span>
              <span class="text-gray-600">(${tablesOnlyInDb2.length} - missing from ${db1Name})</span>
            </h3>
            <div class="flex flex-wrap gap-2">
              ${tablesOnlyInDb2.map(renderTableBtn).join('')}
            </div>
          </div>
        `;
      }
      
      if (filteredTables.length === 0) {
        html += `<div class="text-gray-500 italic">No tables match this filter</div>`;
      }
      
      html += `<div id="schema-result"></div>`;
      content.innerHTML = html;
    }

    // Load schema for specific table
    async function loadSchemaForTable(table) {
      const result = document.getElementById('schema-result');
      result.innerHTML = '<div class="loader"></div>';
      
      // Check if table is missing from one DB
      if (schemasOverviewData) {
        const tableInfo = schemasOverviewData.tables.find(t => t.table === table);
        if (tableInfo && tableInfo.status === 'missing') {
          const missingFrom = tableInfo.inDb1 ? db2Name : db1Name;
          const existsIn = tableInfo.inDb1 ? db1Name : db2Name;
          result.innerHTML = `
            <div class="fade-in bg-gray-900 border border-gray-600 rounded-lg p-6 text-center">
              <div class="text-4xl mb-4">⚫</div>
              <h3 class="text-xl font-semibold mb-2">Table: <span class="text-blue-400">${table}</span></h3>
              <p class="text-gray-400">This table is <span class="text-red-400 font-semibold">missing</span> from <span class="font-semibold">${missingFrom}</span></p>
              <p class="text-gray-500 text-sm mt-2">It only exists in ${existsIn}</p>
            </div>
          `;
          return;
        }
      }
      
      try {
        const res = await fetch(`/api/schema/${encodeURIComponent(table)}`);
        const data = await res.json();
        
        let html = `
          <div class="fade-in">
            <h3 class="text-lg font-semibold mb-3">Table: <span class="text-blue-400">${table}</span></h3>
            <div class="grid grid-cols-4 gap-3 mb-4">
              <div class="bg-green-900/30 rounded p-3 text-center">
                <div class="text-xl font-bold text-green-400">${data.summary.matching}</div>
                <div class="text-xs text-gray-400">Matching</div>
              </div>
              <div class="bg-yellow-900/30 rounded p-3 text-center">
                <div class="text-xl font-bold text-yellow-400">${data.summary.different}</div>
                <div class="text-xs text-gray-400">Different</div>
              </div>
              <div class="bg-red-900/30 rounded p-3 text-center">
                <div class="text-xl font-bold text-red-400">${data.summary.onlyInDb1}</div>
                <div class="text-xs text-gray-400">Only in ${db1Name}</div>
              </div>
              <div class="bg-red-900/30 rounded p-3 text-center">
                <div class="text-xl font-bold text-red-400">${data.summary.onlyInDb2}</div>
                <div class="text-xs text-gray-400">Only in ${db2Name}</div>
              </div>
            </div>
            
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead>
                  <tr class="border-b border-gray-700">
                    <th class="text-left py-2 px-3">Column</th>

                             col.status === 'different' ? 'text-yellow-400' : 'text-red-400';
          const statusText = col.status === 'match' ? '✓ Match' :
                            col.status === 'different' ? '⚠ Different' :
                            col.status === 'db1-only' ? `✗ ${db1Name} only` : `✗ ${db2Name} only`;
          
          const diffs = col.differences ? col.differences.map(d => 
            `<span class="inline-block bg-gray-700 rounded px-2 py-0.5 mr-1 mb-1">${d.prop}: <span class="text-db1">${d.db1 || 'NULL'}</span> → <span class="text-db2">${d.db2 || 'NULL'}</span></span>`

          html += `

              <td class="py-2 px-3 text-gray-300">${col.db1?.Type || '-'}</td>

              <td class="py-2 px-3">${diffs}</td>

        }
        
        html += '</tbody></table></div>';
        
        // --- ADD SQL Query Generation for Missing Columns ---
        const missingInDb2 = data.columns.filter(c => c.status === 'db1-only'); // DB2 is missing these
        const missingInDb1 = data.columns.filter(c => c.status === 'db2-only'); // DB1 is missing these
        
        if (missingInDb2.length > 0 || missingInDb1.length > 0) {
          html += `<div class="mt-6 border-t border-gray-700 pt-4">

            <div class="grid md:grid-cols-2 gap-4">

          // Target DB2 (Target)
          if (missingInDb2.length > 0 || missingInDb1.length > 0) {
             html += `<div class="bg-gray-900 rounded-lg border border-db2 p-4">
               <h5 class="text-db2 font-medium mb-2 border-b border-gray-700 pb-2">Apply to ${db2Name} (Target)</h5>
             `;
             
             if (missingInDb2.length > 0) {
               const addCols = missingInDb2.map(c => `ADD COLUMN \`${c.column}\` ${c.db1.Type}${c.db1.Null === 'NO' ? ' NOT NULL' : ''}${c.db1.Default !== null ? ` DEFAULT '${c.db1.Default}'` : ''}`).join(',\n  ');
               const addQuery = `ALTER TABLE \`${table}\`\n  ${addCols};`;
               html += `

                   <div class="flex justify-between items-center mb-1">
                     <span class="text-xs text-green-400 font-semibold">↳ Add missing columns</span>
                     <button onclick="window.copyQuery(this, this.parentElement.nextElementSibling.innerText)" class="text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded text-gray-300 transition-colors">Copy</button>
                   </div>
                   <pre class="bg-black p-2 rounded text-xs text-gray-300 overflow-x-auto border border-gray-800">${addQuery}</pre>
                 </div>
               `;
             }
             
             if (missingInDb1.length > 0) {
               const dropCols = missingInDb1.map(c => `DROP COLUMN \`${c.column}\``).join(',\n  ');
               const dropQuery = `ALTER TABLE \`${table}\`\n  ${dropCols};`;
               html += `
                 <div>
                   <div class="flex justify-between items-center mb-1">
                     <span class="text-xs text-red-400 font-semibold">↳ Remove extra columns</span>
                     <button onclick="window.copyQuery(this, this.parentElement.nextElementSibling.innerText)" class="text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded text-gray-300 transition-colors">Copy</button>
                   </div>
                   <pre class="bg-black p-2 rounded text-xs text-gray-300 overflow-x-auto border border-gray-800">${dropQuery}</pre>
                 </div>
               `;
             }
             html += `</div>`;
          }
          
          // Target DB1 (Source)
          if (missingInDb1.length > 0 || missingInDb2.length > 0) {
             html += `<div class="bg-gray-900 rounded-lg border border-db1 p-4">
               <h5 class="text-db1 font-medium mb-2 border-b border-gray-700 pb-2">Apply to ${db1Name} (Source)</h5>
             `;
             
             if (missingInDb1.length > 0) {
               const addCols = missingInDb1.map(c => `ADD COLUMN \`${c.column}\` ${c.db2.Type}${c.db2.Null === 'NO' ? ' NOT NULL' : ''}${c.db2.Default !== null ? ` DEFAULT '${c.db2.Default}'` : ''}`).join(',\n  ');
               const addQuery = `ALTER TABLE \`${table}\`\n  ${addCols};`;
               html += `
                 <div class="mb-3">
                   <div class="flex justify-between items-center mb-1">
                     <span class="text-xs text-green-400 font-semibold">↳ Add missing columns</span>
                     <button onclick="window.copyQuery(this, this.parentElement.nextElementSibling.innerText)" class="text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded text-gray-300 transition-colors">Copy</button>
                   </div>
                   <pre class="bg-black p-2 rounded text-xs text-gray-300 overflow-x-auto border border-gray-800">${addQuery}</pre>
                 </div>
               `;
             }
             
             if (missingInDb2.length > 0) {
               const dropCols = missingInDb2.map(c => `DROP COLUMN \`${c.column}\``).join(',\n  ');
               const dropQuery = `ALTER TABLE \`${table}\`\n  ${dropCols};`;
               html += `
                 <div>
                   <div class="flex justify-between items-center mb-1">
                     <span class="text-xs text-red-400 font-semibold">↳ Remove extra columns</span>
                     <button onclick="window.copyQuery(this, this.parentElement.nextElementSibling.innerText)" class="text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded text-gray-300 transition-colors">Copy</button>
                   </div>
                   <pre class="bg-black p-2 rounded text-xs text-gray-300 overflow-x-auto border border-gray-800">${dropQuery}</pre>
                 </div>
               `;
             }
             html += `</div>`;
          }
          
          html += `</div></div>`; // close grid and outer div
        }
        
        html += '</div>'; // close main fade-in div
        result.innerHTML = html;
        
      } catch (e) {
        result.innerHTML = `<div class="text-red-400">Error: ${e.message}</div>`;
      }
    }

    // Row counts filter state
    let rowCountsData = null;
    let currentCountFilter = 'all';
    
    // Load row counts
    async function loadCounts(filter = 'all') {
      currentCountFilter = filter;
      const content = document.getElementById('tab-content');
      
      if (!rowCountsData) {
        content.innerHTML = '<div class="text-center py-8"><div class="loader mx-auto"></div><p class="text-gray-400 mt-2">Counting rows in all tables...</p></div>';
        try {
          const res = await fetch('/api/row-counts');
          rowCountsData = await res.json();
        } catch (e) {
          content.innerHTML = `<div class="text-red-400">Error: ${e.message}</div>`;
          return;
        }
      }
      
      const data = rowCountsData;
      const filterBtnClass = (f) => f === filter 
        ? 'ring-2 ring-white ring-offset-2 ring-offset-gray-800 transform scale-105' 
        : 'hover:scale-105 cursor-pointer';
      
      let html = `
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold">🔢 Row Count Comparison</h2>
          <button onclick="rowCountsData = null; loadCounts(currentCountFilter)" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-sm flex items-center gap-1">
            <span>🔄</span> Refresh
          </button>
        </div>
        <p class="text-gray-400 text-sm mb-3">Click a card to filter:</p>
        <div class="grid grid-cols-3 gap-4 mb-6">
          <div onclick="loadCounts('all')" class="bg-gray-700 rounded-lg p-4 text-center transition-all cursor-pointer ${filterBtnClass('all')}">
            <div class="text-2xl font-bold">${data.summary.total}</div>
            <div class="text-sm text-gray-400">All Tables</div>
          </div>
          <div onclick="loadCounts('matching')" class="bg-green-900/30 rounded-lg p-4 text-center transition-all cursor-pointer ${filterBtnClass('matching')}">
            <div class="text-2xl font-bold text-green-400">${data.summary.matching}</div>
            <div class="text-sm text-gray-400">Matching Counts</div>
          </div>
          <div onclick="loadCounts('different')" class="bg-red-900/30 rounded-lg p-4 text-center transition-all cursor-pointer ${filterBtnClass('different')}">
            <div class="text-2xl font-bold text-red-400">${data.summary.different}</div>
            <div class="text-sm text-gray-400">Different Counts</div>
          </div>
        </div>
        
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-gray-700">
                <th class="text-left py-3 px-4">Table</th>
                <th class="text-right py-3 px-4 text-db1">${db1Name} Count</th>
                <th class="text-right py-3 px-4 text-db2">${db2Name} Count</th>
                <th class="text-right py-3 px-4">Difference</th>
                <th class="text-center py-3 px-4">Status</th>
              </tr>
            </thead>
            <tbody>
      `;
      
      // Apply filter
      let filteredData = [...data.tables];
      if (filter === 'matching') {
        filteredData = filteredData.filter(r => r.match);
      } else if (filter === 'different') {
        filteredData = filteredData.filter(r => !r.match);
      }
      
      // Sort by difference (most different first)
      filteredData.sort((a, b) => Math.abs(b.difference) - Math.abs(a.difference));
      
      if (filteredData.length === 0) {
        html += `<tr><td colspan="5" class="py-8 text-center text-gray-400">No tables match this filter</td></tr>`;
      }
      
      for (const row of filteredData) {
        const diffClass = row.difference > 0 ? 'text-db1' : row.difference < 0 ? 'text-db2' : 'text-gray-400';
        const diffText = row.difference > 0 ? `+${row.difference.toLocaleString()}` : row.difference.toLocaleString();
        
        html += `
          <tr class="border-b border-gray-700/50 hover:bg-gray-700/30">
            <td class="py-3 px-4 font-medium">${row.table}</td>
            <td class="text-right py-3 px-4">${row.db1Count.toLocaleString()}</td>
            <td class="text-right py-3 px-4">${row.db2Count.toLocaleString()}</td>
            <td class="text-right py-3 px-4 ${diffClass}">${diffText}</td>
            <td class="text-center py-3 px-4">${row.match ? '<span class="text-green-400">✓</span>' : '<span class="text-red-400">✗</span>'}</td>
          </tr>
        `;
      }
      
      html += '</tbody></table></div>';
      content.innerHTML = html;
    }

    // Load PK comparison
    async function loadPKs() {
      const content = document.getElementById('tab-content');
      
      if (!tablesData) {
        await loadTables();
      }
      
      const commonTables = tablesData.tables.filter(t => t.status === 'both');
      
      let html = `
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold">🔑 Primary Key Comparison</h2>
          <button onclick="tablesData = null; loadPKs()" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-sm flex items-center gap-1">
            <span>🔄</span> Refresh
          </button>
        </div>
        <p class="text-gray-400 mb-4">Select a table to compare primary key values:</p>
        <div class="flex flex-wrap gap-2 mb-6">
      `;
      
      for (const table of commonTables) {
        html += `<button onclick="loadPKForTable('${table.name}')" class="px-3 py-1 rounded bg-gray-700 hover:bg-gray-600 text-sm">${table.name}</button>`;
      }
      
      html += `</div><div id="pk-result"></div>`;
      content.innerHTML = html;
    }

    // Load PK for specific table
    async function loadPKForTable(table) {
      const result = document.getElementById('pk-result');
      result.innerHTML = '<div class="loader"></div> <span class="text-gray-400">Comparing primary keys...</span>';
      
      try {
        const res = await fetch(`/api/pk-compare/${encodeURIComponent(table)}`);
        const data = await res.json();
        
        if (!data.hasPrimaryKey) {
          result.innerHTML = `<div class="text-yellow-400 fade-in">⚠ Table ${table} has no primary key defined</div>`;
          return;
        }
        
        if (data.pkMismatch) {
          result.innerHTML = `
            <div class="text-red-400 fade-in">
              ✗ Primary key structure differs!<br>
              ${db1Name}: ${data.db1Pks.join(', ')}<br>
              ${db2Name}: ${data.db2Pks.join(', ')}
            </div>
          `;
          return;
        }
        
        let html = `
          <div class="fade-in">
            <h3 class="text-lg font-semibold mb-3">Table: <span class="text-blue-400">${table}</span></h3>
            <p class="text-gray-400 mb-3">Primary Key: <code class="bg-gray-700 px-2 py-1 rounded">${data.primaryKeys.join(', ')}</code></p>
            
            <div class="grid grid-cols-4 gap-3 mb-4">
              <div class="bg-gray-700 rounded p-3 text-center">
                <div class="text-xl font-bold text-db1">${data.db1Total.toLocaleString()}</div>
                <div class="text-xs text-gray-400">${db1Name} Rows</div>
              </div>
              <div class="bg-gray-700 rounded p-3 text-center">
                <div class="text-xl font-bold text-db2">${data.db2Total.toLocaleString()}</div>
                <div class="text-xs text-gray-400">${db2Name} Rows</div>
              </div>
              <div class="bg-green-900/30 rounded p-3 text-center">
                <div class="text-xl font-bold text-green-400">${data.commonCount.toLocaleString()}</div>
                <div class="text-xs text-gray-400">In Both</div>
              </div>
              <div class="bg-red-900/30 rounded p-3 text-center">
                <div class="text-xl font-bold text-red-400">${(data.onlyInDb1Count + data.onlyInDb2Count).toLocaleString()}</div>
                <div class="text-xs text-gray-400">Missing</div>
              </div>
            </div>
        `;
        
        if (data.onlyInDb1Count > 0) {
          html += `
            <div class="mb-4">
              <h4 class="text-red-400 font-medium mb-2">✗ ${data.onlyInDb1Count} rows only in ${db1Name}:</h4>
              <div class="bg-gray-900 rounded p-3 max-h-40 overflow-auto">
                <code class="text-xs">${JSON.stringify(data.onlyInDb1.slice(0, 20), null, 2)}</code>
                ${data.onlyInDb1Count > 20 ? `<div class="text-gray-500 mt-2">... and ${data.onlyInDb1Count - 20} more</div>` : ''}
              </div>
            </div>
          `;
        }
        
        if (data.onlyInDb2Count > 0) {
          html += `
            <div class="mb-4">
              <h4 class="text-red-400 font-medium mb-2">✗ ${data.onlyInDb2Count} rows only in ${db2Name}:</h4>
              <div class="bg-gray-900 rounded p-3 max-h-40 overflow-auto">
                <code class="text-xs">${JSON.stringify(data.onlyInDb2.slice(0, 20), null, 2)}</code>
                ${data.onlyInDb2Count > 20 ? `<div class="text-gray-500 mt-2">... and ${data.onlyInDb2Count - 20} more</div>` : ''}
              </div>
            </div>
          `;
        }
        
        if (data.onlyInDb1Count === 0 && data.onlyInDb2Count === 0) {
          html += `<div class="text-green-400 font-medium">✓ All primary keys match!</div>`;
        }
        
        html += '</div>';
        result.innerHTML = html;
        
      } catch (e) {
        result.innerHTML = `<div class="text-red-400">Error: ${e.message}</div>`;
      }
    }

    // Load row content comparison
    let currentRowTable = null;
    let currentRowBase = 'db1';
    let currentRowData = null;
    
    async function loadRows() {
      const content = document.getElementById('tab-content');
      
      if (!tablesData) {
        await loadTables();
      }
      
      const commonTables = tablesData.tables.filter(t => t.status === 'both');
      
      let html = `

          <h2 class="text-xl font-bold">📝 Full Row Content Comparison</h2>
          <button onclick="tablesData = null; loadRows()" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-sm flex items-center gap-1">
            <span>🔄</span> Refresh
          </button>
        </div>
        <p class="text-gray-400 mb-2">Select options and a table to compare:</p>
        
        <div class="flex flex-wrap gap-4 mb-4 items-center">
          <div>
            <label class="text-gray-400 text-sm block mb-1">Row Limit:</label>
            <select id="row-limit" class="bg-gray-700 rounded px-3 py-2 text-sm">

        <div class="flex flex-wrap gap-2 mb-6">
      `;
      
      for (const table of commonTables) {
        html += `<button onclick="loadRowsForTable('${table.name}')" class="px-3 py-1 rounded bg-gray-700 hover:bg-gray-600 text-sm">${table.name}</button>`;
      }
      
      html += `</div><div id="rows-result"></div>`;
      content.innerHTML = html;
    }

    // Load rows for specific table in table format
    async function loadRowsForTable(table) {
      currentRowTable = table;
      const result = document.getElementById('rows-result');
      const limit = document.getElementById('row-limit').value;
      const base = document.getElementById('row-base').value;
      currentRowBase = base;
      
      result.innerHTML = '<div class="loader"></div> <span class="text-gray-400">Comparing rows (this may take a while)...</span>';
      
      try {
        const res = await fetch(`/api/row-table/${encodeURIComponent(table)}?limit=${limit}&base=${base}`);
        const data = await res.json();
        currentRowData = data;
        
        const baseName = base === 'db1' ? db1Name : db2Name;
        const compareName = base === 'db1' ? db2Name : db1Name;
        
        let html = `
          <div class="fade-in">
            <h3 class="text-lg font-semibold mb-3">Table: <span class="text-blue-400">${table}</span></h3>
            <p class="text-gray-400 mb-3">Base: <span class="text-db1 font-medium">${baseName}</span> | Comparing against: <span class="text-db2 font-medium">${compareName}</span></p>
            
            <div class="grid grid-cols-5 gap-3 mb-4">
              <div class="bg-gray-700 rounded p-3 text-center">
                <div class="text-xl font-bold text-db1">${data.summary.baseTotal.toLocaleString()}</div>
                <div class="text-xs text-gray-400">${baseName} Rows</div>
              </div>
              <div class="bg-gray-700 rounded p-3 text-center">
                <div class="text-xl font-bold text-db2">${data.summary.compareTotal.toLocaleString()}</div>
                <div class="text-xs text-gray-400">${compareName} Rows</div>
              </div>
              <div class="bg-green-900/30 rounded p-3 text-center">
                <div class="text-xl font-bold text-green-400">${data.summary.matching}</div>
                <div class="text-xs text-gray-400">Matching</div>
              </div>
              <div class="bg-yellow-900/30 rounded p-3 text-center">
                <div class="text-xl font-bold text-yellow-400">${data.summary.different}</div>
                <div class="text-xs text-gray-400">Different</div>
              </div>
              <div class="bg-red-900/30 rounded p-3 text-center">
                <div class="text-xl font-bold text-red-400">${data.summary.missingInCompare + data.summary.extraInCompare}</div>
                <div class="text-xs text-gray-400">Missing/Extra</div>
              </div>
            </div>
            
            <div class="mb-2 text-sm">
              <span class="inline-block w-4 h-4 bg-green-900/50 rounded mr-1 align-middle"></span> Row matches
              <span class="inline-block w-4 h-4 bg-yellow-900/50 rounded mr-1 ml-3 align-middle"></span> Row differs (click to expand)
              <span class="inline-block w-4 h-4 bg-red-900/50 rounded mr-1 ml-3 align-middle"></span> Row missing in ${compareName}
              <span class="inline-block w-4 h-4 bg-purple-900/50 rounded mr-1 ml-3 align-middle"></span> Extra in ${compareName}
            </div>
            
            <div class="overflow-x-auto">
              <table class="w-full text-xs border-collapse">
                <thead class="sticky top-0 bg-gray-800">
                  <tr class="border-b border-gray-600">
                    <th class="text-left py-2 px-2 text-gray-400">#</th>
        `;
        
        // Column headers
        for (const col of data.columns) {
          const colClass = col.status === 'both' ? 'text-gray-200' : 
                          col.status === 'db1-only' ? 'text-red-400 bg-red-900/20' : 
                          'text-red-400 bg-red-900/20';
          const tooltip = col.status !== 'both' ? ` title="Only in ${col.status === 'db1-only' ? db1Name : db2Name}"` : '';
          html += `<th class="text-left py-2 px-2 ${colClass} whitespace-nowrap"${tooltip}>${col.name}${col.status !== 'both' ? ' ⚠' : ''}</th>`;
        }
        
        html += `</tr></thead><tbody>`;
        
        // Data rows from base
        let rowNum = 0;
        for (const row of data.rows) {
          rowNum++;
          const rowId = `row-${rowNum}`;
          let rowClass = '';
          let clickable = '';
          
          if (row.status === 'match') {
            rowClass = 'bg-green-900/20 hover:bg-green-900/30';
          } else if (row.status === 'different') {
            rowClass = 'bg-yellow-900/20 hover:bg-yellow-900/30 cursor-pointer';
            clickable = ` onclick="toggleRowExpand('${rowId}')"`;
          } else if (row.status === 'missing') {
            rowClass = 'bg-red-900/20 hover:bg-red-900/30';
          }
          
          html += `<tr class="${rowClass} border-b border-gray-700/50"${clickable} id="${rowId}">`;
          html += `<td class="py-1 px-2 text-gray-500">${rowNum}</td>`;
          
          for (const col of data.columns) {
            const val = row.baseRow ? row.baseRow[col.name] : null;
            const isDiff = row.diffColumns.includes(col.name);
            const cellClass = isDiff ? 'bg-yellow-500/30 text-yellow-200' : '';
            const displayVal = formatCellValue(val);
            html += `<td class="py-1 px-2 ${cellClass} max-w-xs truncate" title="${escapeHtml(String(val ?? 'NULL'))}">${displayVal}</td>`;
          }
          
          html += `</tr>`;
          
          // Expandable row for differences
          if (row.status === 'different' && row.compareRow) {
            html += `<tr id="${rowId}-expand" class="hidden bg-gray-900 border-b border-gray-600">`;
            html += `<td class="py-1 px-2 text-db2">↳</td>`;
            
            for (const col of data.columns) {
              const val = row.compareRow[col.name];
              const isDiff = row.diffColumns.includes(col.name);
              const cellClass = isDiff ? 'bg-purple-500/30 text-purple-200' : 'text-gray-500';
              const displayVal = formatCellValue(val);
              html += `<td class="py-1 px-2 ${cellClass} max-w-xs truncate" title="${escapeHtml(String(val ?? 'NULL'))}">${displayVal}</td>`;
            }
            
            html += `</tr>`;
          }
        }
        
        // Extra rows (only in compare DB)
        for (const row of data.extraRows) {
          rowNum++;
          html += `<tr class="bg-purple-900/20 hover:bg-purple-900/30 border-b border-gray-700/50">`;
          html += `<td class="py-1 px-2 text-gray-500">${rowNum} <span class="text-purple-400 text-xs">(extra)</span></td>`;
          
          for (const col of data.columns) {
            const val = row.compareRow ? row.compareRow[col.name] : null;
            const displayVal = formatCellValue(val);
            html += `<td class="py-1 px-2 text-purple-300 max-w-xs truncate" title="${escapeHtml(String(val ?? 'NULL'))}">${displayVal}</td>`;
          }
          
          html += `</tr>`;
        }
        
        html += `</tbody></table></div>`;
        
        if (data.summary.matching === data.summary.baseTotal && data.summary.extraInCompare === 0) {
          html += `<div class="text-green-400 font-medium text-lg mt-4">✓ All rows match perfectly!</div>`;
        }
        
        html += '</div>';
        result.innerHTML = html;
        
      } catch (e) {
        result.innerHTML = `<div class="text-red-400">Error: ${e.message}</div>`;
      }
    }
    
    // Toggle expand row
    function toggleRowExpand(rowId) {
      const expandRow = document.getElementById(rowId + '-expand');
      if (expandRow) {
        expandRow.classList.toggle('hidden');
      }
    }
    
    // Format cell value for display
    function formatCellValue(val) {
      if (val === null || val === undefined) return '<span class="text-gray-500">NULL</span>';
      if (val instanceof Date) return val.toISOString().split('T')[0];
      if (typeof val === 'object') return JSON.stringify(val).substring(0, 30);
      const str = String(val);
      if (str.length > 40) return escapeHtml(str.substring(0, 40)) + '...';
      return escapeHtml(str);
    }
    
    // Escape HTML
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

      // Escape HTML and highlight the table name
      let content = fileContent
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // Highlight missing tables in red
      for (const table of endpoint.missingTables) {
        const escaped = table.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`(${escaped})`, 'gi');
        content = content.replace(regex, '<mark class="bg-red-500 text-white px-1 rounded">$1</mark>');
      }
      
      // Highlight existing tables in green
      for (const table of endpoint.existingTables) {
        const escaped = table.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`(${escaped})`, 'gi');
        content = content.replace(regex, '<mark class="bg-green-600 text-white px-1 rounded">$1</mark>');
      }
      
      html += `
          <pre class="bg-gray-950 p-4 rounded-lg overflow-x-auto text-sm text-gray-300 max-h-64 overflow-y-auto border border-gray-700"><code>${content}</code></pre>
        </div>
      `;
      
      detailsDiv.innerHTML = html;
      detailsDiv.classList.remove('hidden');
    }

    // Helper function
    function truncate(str, len) {
      if (!str) return '';
      return str.length > len ? str.substring(0, len) + '...' : str;
    }

    // ═══════════════════════════════════════════════════════════════════════
    // FLOW TABLE GENERATOR
    // ═══════════════════════════════════════════════════════════════════════

    let flowState = {
      db: null,
      table: null,
      columns: [],
      primaryKeys: [],
      flowTableName: ''
    };

    async function loadFlowTable() {
      const content = document.getElementById('tab-content');
      content.innerHTML = `
        <div class="fade-in">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">🌊 Flow Table Generator</h2>
          </div>

          <!-- Step 1: Select DB -->
          <div class="mb-6">
            <p class="text-gray-400 text-sm mb-3">Step 1 — Select a database:</p>
            <div class="flex gap-3">
              <button onclick="flowSelectDb('db1')" id="flow-btn-db1"
                class="px-5 py-2 rounded-lg border-2 border-db1 text-db1 font-semibold hover:bg-db1 hover:text-gray-900 transition-colors">
                📊 ${db1Name}
              </button>
              <button onclick="flowSelectDb('db2')" id="flow-btn-db2"
                class="px-5 py-2 rounded-lg border-2 border-db2 text-db2 font-semibold hover:bg-db2 hover:text-gray-900 transition-colors">
                📊 ${db2Name}
              </button>
            </div>
          </div>

          <!-- Step 2: Table list (populated after DB selection) -->
          <div id="flow-table-list" class="mb-6"></div>

          <!-- Step 3: Column config panel (shown after table selection) -->
          <div id="flow-config-panel" class="mb-6"></div>

          <!-- Step 4: Generated SQL output -->
          <div id="flow-sql-output"></div>
        </div>
      `;
    }

    async function flowSelectDb(db) {
      flowState.db = db;
      flowState.table = null;
      flowState.columns = [];

      // Highlight selected DB button
      ['db1', 'db2'].forEach(d => {
        const btn = document.getElementById(`flow-btn-${d}`);
        if (!btn) return;
        if (d === db) {
          btn.classList.add('bg-opacity-20');
          const color = d === 'db1' ? 'bg-cyan-700' : 'bg-purple-700';
          btn.classList.add(color, 'text-white');
        } else {
          btn.classList.remove('bg-cyan-700', 'bg-purple-700', 'text-white');
        }
      });

      const listDiv = document.getElementById('flow-table-list');
      const configPanel = document.getElementById('flow-config-panel');
      const sqlOutput = document.getElementById('flow-sql-output');
      listDiv.innerHTML = '<div class="loader inline-block mr-2"></div><span class="text-gray-400">Loading tables...</span>';
      configPanel.innerHTML = '';
      sqlOutput.innerHTML = '';

      try {
        const res = await fetch(`/api/flow/tables?db=${db}`);
        const data = await res.json();

        const colorClass = db === 'db1' ? 'text-db1' : 'text-db2';
        const dbLabel = db === 'db1' ? db1Name : db2Name;

        let html = `
          <p class="text-gray-400 text-sm mb-3">Step 2 — Select a table from <span class="${colorClass} font-semibold">${dbLabel}</span> (${data.tables.length} tables):</p>
          <div class="flex flex-wrap gap-2 max-h-64 overflow-y-auto pr-1">
        `;

        for (const t of data.tables) {
          html += `<button onclick="flowSelectTable('${t.replace(/'/g, "\\'")}')"
            class="flow-table-btn px-3 py-1 rounded bg-gray-700 hover:bg-gray-600 text-sm transition-colors"
            id="flow-tbl-${CSS.escape(t)}">${t}</button>`;
        }
        html += '</div>';
        listDiv.innerHTML = html;
      } catch (e) {
        listDiv.innerHTML = `<div class="text-red-400">Error loading tables: ${e.message}</div>`;
      }
    }

    async function flowSelectTable(tableName) {
      flowState.table = tableName;

      // Highlight selected table button
      document.querySelectorAll('.flow-table-btn').forEach(b => {
        b.classList.remove('bg-blue-700', 'text-white');
        b.classList.add('bg-gray-700');
      });
      const selBtn = document.getElementById(`flow-tbl-${CSS.escape(tableName)}`);
      if (selBtn) {
        selBtn.classList.remove('bg-gray-700');
        selBtn.classList.add('bg-blue-700', 'text-white');
      }

      const configPanel = document.getElementById('flow-config-panel');
      const sqlOutput = document.getElementById('flow-sql-output');
      configPanel.innerHTML = '<div class="loader inline-block mr-2"></div><span class="text-gray-400">Loading columns...</span>';
      sqlOutput.innerHTML = '';

      try {
        const res = await fetch(`/api/flow/columns?db=${flowState.db}&table=${encodeURIComponent(tableName)}`);
        const data = await res.json();
        flowState.columns = data.columns;
        flowState.primaryKeys = data.primaryKeys;
        flowState.flowTableName = tableName + '_flow';
        renderFlowConfigPanel();
      } catch (e) {
        configPanel.innerHTML = `<div class="text-red-400">Error loading columns: ${e.message}</div>`;
      }
    }

    function renderFlowConfigPanel() {
      const configPanel = document.getElementById('flow-config-panel');
      const { table, columns, primaryKeys, flowTableName } = flowState;

      const pkBadges = primaryKeys.length > 0
        ? primaryKeys.map(pk => `<span class="inline-block bg-yellow-800 text-yellow-200 text-xs px-2 py-0.5 rounded mr-1">${pk}</span>`).join('')
        : '<span class="text-gray-500 text-xs">none detected</span>';

      let colRows = '';
      for (const col of columns) {
        const pkMark = col.isPrimary
          ? '<span class="text-yellow-400 ml-1" title="Primary Key">🔑</span>'
          : '';
        colRows += `
          <label class="flex items-center gap-3 py-1.5 px-2 rounded hover:bg-gray-700/50 cursor-pointer">
            <input type="checkbox" class="flow-col-checkbox w-4 h-4 accent-blue-500"
              data-field="${escapeHtml(col.field)}" checked>
            <span class="font-mono text-sm text-gray-200">${escapeHtml(col.field)}${pkMark}</span>
            <span class="text-xs text-gray-500">${escapeHtml(col.type)}${col.nullable ? '' : ' NOT NULL'}</span>
          </label>
        `;
      }

      configPanel.innerHTML = `
        <div class="border border-gray-700 rounded-lg p-5 bg-gray-900/50">
          <h3 class="text-lg font-semibold mb-4">Step 3 — Configure Flow Table for
            <span class="text-blue-400">${escapeHtml(table)}</span>
          </h3>

          <div class="mb-5">
            <label class="text-gray-400 text-sm block mb-1">Flow table name:</label>
            <input id="flow-table-name-input" type="text" value="${escapeHtml(flowTableName)}"
              class="bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm w-full max-w-sm focus:border-blue-500 outline-none"
              oninput="flowState.flowTableName = this.value">
          </div>

          <div class="mb-2 flex items-center justify-between">
            <div class="text-gray-400 text-sm">
              Columns to include (detected PKs: ${pkBadges}):
            </div>
            <div class="flex gap-2 text-sm">
              <button onclick="flowToggleAllCols(true)" class="text-blue-400 hover:underline">Check all</button>
              <span class="text-gray-600">|</span>
              <button onclick="flowToggleAllCols(false)" class="text-blue-400 hover:underline">Uncheck all</button>
            </div>
          </div>

          <div class="bg-gray-800 rounded-lg p-3 max-h-72 overflow-y-auto mb-5 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-4">
            ${colRows}
          </div>

          <div class="mt-4 p-3 bg-gray-800 rounded text-sm text-gray-400 border border-gray-700">
            <span class="text-gray-300 font-semibold">4 extra columns will be added automatically:</span>
            <div class="mt-2 grid grid-cols-2 md:grid-cols-4 gap-2 text-xs">
              <div class="bg-gray-900 rounded p-2"><code class="text-green-400">flow_uid</code><br><span>INT PK AUTO_INCREMENT</span></div>
              <div class="bg-gray-900 rounded p-2"><code class="text-green-400">flow_create_time</code><br><span>DATETIME DEFAULT CURRENT_TIMESTAMP</span></div>
              <div class="bg-gray-900 rounded p-2"><code class="text-green-400">flow_update_time</code><br><span>DATETIME ON UPDATE CURRENT_TIMESTAMP</span></div>
              <div class="bg-gray-900 rounded p-2"><code class="text-green-400">flow_action_type</code><br><span>VARCHAR(10)</span></div>
            </div>
          </div>

          <button onclick="flowGenerateSQL()"
            class="mt-5 px-6 py-2 bg-green-700 hover:bg-green-600 text-white font-semibold rounded-lg transition-colors">
            ⚡ Generate SQL
          </button>
        </div>
      `;
    }

    function flowToggleAllCols(checked) {
      document.querySelectorAll('.flow-col-checkbox').forEach(cb => cb.checked = checked);
    }

    function flowGetSelectedColumns() {
      return [...document.querySelectorAll('.flow-col-checkbox')]
        .filter(cb => cb.checked)
        .map(cb => cb.dataset.field);
    }

    function flowGenerateSQL() {
      const { table, columns, primaryKeys, db } = flowState;
      const flowTableName = document.getElementById('flow-table-name-input').value.trim() || table + '_flow';
      const selectedFields = flowGetSelectedColumns();

      if (selectedFields.length === 0) {
        alert('Please select at least one column.');
        return;
      }

      const selectedCols = columns.filter(c => selectedFields.includes(c.field));

      // ── 1. BUILD CREATE TABLE ──────────────────────────────────────────────
      const colDefs = selectedCols.map(col => {
        let def = `  \`${col.field}\` ${col.type}`;
        if (!col.nullable) def += ' NOT NULL';
        if (col.default !== null && col.default !== undefined) {
          const defVal = col.default;
          if (defVal === 'CURRENT_TIMESTAMP' || defVal === 'current_timestamp()') {
            def += ` DEFAULT CURRENT_TIMESTAMP`;
          } else {
            def += ` DEFAULT '${defVal}'`;
          }
        }
        if (col.extra && col.extra !== 'auto_increment') def += ` ${col.extra.toUpperCase()}`;
        return def;
      });

      const createTableSQL =
`CREATE TABLE \`${flowTableName}\` (
  \`flow_uid\` INT NOT NULL AUTO_INCREMENT,
${colDefs.join(',\n')},
  \`flow_create_time\` DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
  \`flow_update_time\` DATETIME NULL DEFAULT NULL ON UPDATE CURRENT_TIMESTAMP,
  \`flow_action_type\` VARCHAR(10) NOT NULL,
  PRIMARY KEY (\`flow_uid\`)
) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;`;

      // ── 2. BUILD TRIGGERS ──────────────────────────────────────────────────
      const colList = selectedFields.map(f => `\`${f}\``).join(', ');
      const newValList = selectedFields.map(f => `NEW.\`${f}\``).join(', ');
      const oldValList = selectedFields.map(f => `OLD.\`${f}\``).join(', ');

      // INSERT trigger
      const insertTriggerSQL =
`CREATE TRIGGER \`${table}_after_insert\`
AFTER INSERT ON \`${table}\`
FOR EACH ROW
BEGIN
  DECLARE CONTINUE HANDLER FOR SQLEXCEPTION BEGIN END;

  INSERT INTO \`${flowTableName}\` (
    ${colList},
    \`flow_action_type\`
  )
  VALUES (
    ${newValList},
    'INSERT'
  );
END`;

      // DELETE trigger
      const deleteTriggerSQL =
`CREATE TRIGGER \`${table}_after_delete\`
AFTER DELETE ON \`${table}\`
FOR EACH ROW
BEGIN
  DECLARE CONTINUE HANDLER FOR SQLEXCEPTION BEGIN END;

  INSERT INTO \`${flowTableName}\` (
    ${colList},
    \`flow_action_type\`
  )
  VALUES (
    ${oldValList},
    'DELETE'
  );
END`;

      // UPDATE trigger — detect PK change dynamically
      const dataUnchangedCondition = selectedFields
        .map(f => `OLD.\`${f}\` <=> NEW.\`${f}\``)
        .join(' AND ');

      let updateTriggerSQL;
      if (primaryKeys.length > 0) {
        // Build PK change condition: OLD.pk1 != NEW.pk1 OR OLD.pk2 != NEW.pk2 ...
        const pkChangedCondition = primaryKeys
          .map(pk => `OLD.\`${pk}\` != NEW.\`${pk}\``)
          .join(' OR ');

        updateTriggerSQL =
`CREATE TRIGGER \`${table}_after_update\`
AFTER UPDATE ON \`${table}\`
FOR EACH ROW
BEGIN
  DECLARE CONTINUE HANDLER FOR SQLEXCEPTION BEGIN END;

  IF ${dataUnchangedCondition} THEN
    -- No tracked columns changed, do nothing
    BEGIN END;
  ELSEIF ${pkChangedCondition} THEN
    -- PK changed: treat as DELETE of old + INSERT of new
    INSERT INTO \`${flowTableName}\` (
      ${colList},
      \`flow_action_type\`
    )
    VALUES (
      ${oldValList},
      'DELETE'
    );

    INSERT INTO \`${flowTableName}\` (
      ${colList},
      \`flow_action_type\`
    )
    VALUES (
      ${newValList},
      'INSERT'
    );

  ELSE
    -- Normal update, PK unchanged
    INSERT INTO \`${flowTableName}\` (
      ${colList},
      \`flow_action_type\`
    )
    VALUES (
      ${newValList},
      'UPDATE'
    );
  END IF;
END`;
      } else {
        // No PK detected — simple update without PK-change detection
        updateTriggerSQL =
`CREATE TRIGGER \`${table}_after_update\`
AFTER UPDATE ON \`${table}\`
FOR EACH ROW
BEGIN
  DECLARE CONTINUE HANDLER FOR SQLEXCEPTION BEGIN END;

  -- Note: No primary key detected on this table; PK-change detection skipped
  IF ${dataUnchangedCondition} THEN
    -- No tracked columns changed, do nothing
    BEGIN END;
  ELSE
    INSERT INTO \`${flowTableName}\` (
      ${colList},
      \`flow_action_type\`
    )
    VALUES (
      ${newValList},
      'UPDATE'
    );
  END IF;
END`;
      }

      // ── 3. RENDER OUTPUT ───────────────────────────────────────────────────
      const blocks = [
        { label: '① CREATE TABLE', emoji: '🏗️', sql: createTableSQL, id: 'flow-sql-create' },
        { label: '② INSERT Trigger', emoji: '✅', sql: insertTriggerSQL, id: 'flow-sql-insert' },
        { label: '③ DELETE Trigger', emoji: '🗑️', sql: deleteTriggerSQL, id: 'flow-sql-delete' },
        { label: '④ UPDATE Trigger', emoji: '✏️', sql: updateTriggerSQL, id: 'flow-sql-update' }
      ];

      const dbLabel = db === 'db2' ? db2Name : db1Name;
      const pkInfo = primaryKeys.length > 0
        ? `Detected PKs: <span class="text-yellow-400">${primaryKeys.map(p => `\`${p}\``).join(', ')}</span>`
        : '<span class="text-gray-500">No primary key detected</span>';

      let html = `
        <div class="fade-in border-t border-gray-700 pt-6 mt-6">
          <div class="flex justify-between items-center mb-1">
            <h3 class="text-lg font-semibold">Generated SQL for
              <span class="text-blue-400">${escapeHtml(table)}</span>
              → <span class="text-green-400">${escapeHtml(flowTableName)}</span>
            </h3>
            <span class="text-xs text-gray-500">DB: ${dbLabel} · ${pkInfo}</span>
          </div>
          <p class="text-yellow-400 text-sm mb-5">⚠ These queries are for review only — nothing has been executed.</p>
      `;

      for (const block of blocks) {
        const escaped = escapeHtml(block.sql);
        html += `
          <div class="mb-6">
            <div class="flex justify-between items-center mb-2">
              <h4 class="font-semibold text-gray-200">${block.emoji} ${block.label}</h4>
              <button onclick="window.copyQuery(this, document.getElementById('${block.id}').innerText)"
                class="text-xs bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded text-gray-300 transition-colors">
                📋 Copy
              </button>
            </div>
            <pre id="${block.id}" class="bg-black p-4 rounded-lg text-xs text-gray-300 overflow-x-auto border border-gray-700 whitespace-pre">${escaped}</pre>
          </div>
        `;
      }

      html += `</div>`;
      document.getElementById('flow-sql-output').innerHTML = html;

      // Scroll to the output
      document.getElementById('flow-sql-output').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ═══════════════════════════════════════════════════════════════════════
    // END FLOW TABLE GENERATOR
    // ═══════════════════════════════════════════════════════════════════════

    // Initialize on load
    init();
  </script>
</body>
</html>
